name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci

      - name: Add Capacitor Android
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          npx cap add android || true

      - name: Sync Capacitor
        run: npm run cap:sync

      - name: App icons and Android label
        run: npm run generate:icons

      - name: Patch release signing
        run: node scripts/patch-android-release.mjs

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Resolve APK path
        id: apk
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then
            APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          fi
          if [ -z "$APK" ] || [ ! -f "$APK" ]; then
            echo "APK not found"
            ls -laR android/app/build/outputs/apk || true
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Using $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: republic-2077-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Publish APK to GitHub Release (latest)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          gh release delete apk-latest -y 2>/dev/null || true
          gh release create apk-latest \
            --title "Republic 2077 — APK (последняя сборка)" \
            --notes "Автосборка release из \`${{ github.sha }}\`: ${{ github.event.head_commit.message }}" \
            "${{ steps.apk.outputs.path }}"#republic-2077.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
